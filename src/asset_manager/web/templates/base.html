<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    {% block head_extra %}{% endblock %}
    <style>
        :root {
            --bg-deep: #131519;
            --bg-primary: #1a1d23;
            --bg-surface: #22262e;
            --bg-surface-hover: #2a2f38;
            --bg-elevated: #2e3340;
            --border-subtle: #2e3340;
            --border-medium: #3a3f4a;
            --text-primary: #e8e4df;
            --text-secondary: #918c86;
            --text-muted: #5f5b56;
            --accent-gold: #c9a55a;
            --accent-gold-dim: rgba(201, 165, 90, 0.15);
            --accent-gold-glow: rgba(201, 165, 90, 0.08);
            --color-asset: #6aad7a;
            --color-asset-dim: rgba(106, 173, 122, 0.12);
            --color-liability: #c75c5c;
            --color-liability-dim: rgba(199, 92, 92, 0.12);
            --font-display: 'DM Serif Display', Georgia, serif;
            --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
            --radius: 6px;
            --shadow: 0 2px 8px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-deep);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Subtle noise texture overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .header {
            position: relative;
            z-index: 1;
            background-color: var(--bg-primary);
            border-bottom: 1px solid var(--border-subtle);
            padding: 0 2.5rem;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 0 0.75rem;
        }

        .header h1 {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 400;
            color: var(--text-primary);
            letter-spacing: 0.01em;
        }

        .header-actions {
            display: flex;
            gap: 1.25rem;
            align-items: center;
        }

        .user-info {
            color: var(--text-secondary);
            font-size: 0.85rem;
            letter-spacing: 0.02em;
        }

        .btn {
            padding: 0.4rem 0.9rem;
            border: 1px solid var(--border-medium);
            border-radius: var(--radius);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.8rem;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s ease;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            background: var(--bg-surface);
            color: var(--text-primary);
            border-color: var(--text-muted);
        }

        .btn-primary {
            background: var(--accent-gold);
            color: var(--bg-deep);
            border-color: var(--accent-gold);
        }

        .btn-primary:hover {
            background: #d4b165;
            border-color: #d4b165;
        }

        .tab-nav {
            display: flex;
            gap: 0;
            margin-top: 0.25rem;
        }

        .tab-nav a {
            padding: 0.6rem 1.25rem 0.65rem;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            border-bottom: 2px solid transparent;
            transition: color 0.2s, border-color 0.2s;
        }

        .tab-nav a:hover {
            color: var(--text-secondary);
        }

        .tab-nav a.active {
            color: var(--accent-gold);
            border-bottom-color: var(--accent-gold);
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 2.5rem;
        }

        .error {
            background-color: var(--color-liability-dim);
            border: 1px solid rgba(199, 92, 92, 0.3);
            color: #e08888;
            padding: 1rem 1.25rem;
            border-radius: var(--radius);
            margin-bottom: 1.25rem;
            font-size: 0.9rem;
        }

        .no-data {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .no-data code {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            background: var(--bg-surface);
            padding: 0.2rem 0.5rem;
            border-radius: 3px;
            color: var(--accent-gold);
        }

        /* Fade-in animation */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeUp 0.4s ease-out both;
        }

        @media (max-width: 768px) {
            .header {
                padding: 0 1.25rem;
            }
            .container {
                padding: 1.25rem;
            }
        }

        {% block styles %}{% endblock %}
    </style>
</head>
<body>
    <header class="header">
        <div class="header-top">
            <h1>Asset Dashboard</h1>
            <div class="header-actions">
                <span class="user-info">{{ user.name or user.email }}</span>
                <a href="/logout" class="btn btn-secondary">Logout</a>
            </div>
        </div>
        <nav class="tab-nav">
            <a href="/" class="{% if active_tab == 'dashboard' %}active{% endif %}">Dashboard</a>
            <a href="/accounts" class="{% if active_tab == 'accounts' %}active{% endif %}">Accounts</a>
        </nav>
    </header>

    <div class="container">
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
