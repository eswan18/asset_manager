<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Asset Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #131519;
            color: #e8e4df;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        /* Noise texture */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
        }
        .login-container {
            position: relative;
            background-color: #22262e;
            border: 1px solid #2e3340;
            border-radius: 6px;
            padding: 3rem 2.5rem;
            text-align: center;
            max-width: 380px;
            width: 90%;
            animation: fadeUp 0.5s ease-out both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            font-family: 'DM Serif Display', Georgia, serif;
            font-size: 1.6rem;
            font-weight: 400;
            margin-bottom: 0.4rem;
            letter-spacing: 0.01em;
        }
        .subtitle {
            color: #918c86;
            font-size: 0.9rem;
            margin-bottom: 2.5rem;
        }
        .btn {
            display: inline-block;
            padding: 0.65rem 1.75rem;
            border: 1px solid #c9a55a;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s ease;
            background: #c9a55a;
            color: #131519;
        }
        .btn:hover {
            background: #d4b165;
            border-color: #d4b165;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Asset Dashboard</h1>
        <p class="subtitle">Sign in to view your financial data</p>
        <a href="/auth/start" class="btn">Sign In</a>
    </div>
</body>
</html>
